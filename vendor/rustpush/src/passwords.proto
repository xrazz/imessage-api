syntax = "proto3";

package passwordsp;

message SharingPrivateKey {
    optional string accessGroup = 1;
    optional int64 keyType = 2;
    optional bytes applicationTag = 3;
    optional string label = 4;
    optional bytes applicationLabel = 5;
    optional bytes keyMaterial = 6;
    optional int64 keySizeInBits = 7;
    optional int64 effectiveKeySize = 8;
    optional double creationDate = 9;
    optional double modificationDate = 10;
    // tag 11 appears unused/reserved in observed writeTo ordering
    optional int32 creator = 12;
    optional double startDate = 13;
    optional double endDate = 14;
    optional string viewHint = 15;
    optional int32 keyClass = 16;
    optional int32 isPermanent = 17;
    optional int32 isPrivate = 18;
    optional int32 isModifiable = 19;
    optional int32 isSensitive = 20;
    optional int32 wasAlwaysSensitive = 21;
    optional int32 isExtractable = 22;
    optional int32 wasNeverExtractable = 23;
    optional int32 canEncrypt = 24;
    optional int32 canDecrypt = 25;
    optional int32 canDerive = 26;
    optional int32 canSign = 27;
    optional int32 canVerify = 28;
    optional int32 canSignRecover = 29;
    optional int32 canVerifyRecover = 30;
    optional int32 canWrap = 31;
    optional int32 canUnwrap = 32;
    optional bytes alias = 33;
}

message SharingInternetPassword {
    optional string accessGroup = 1;
    optional double modificationDate = 2;
    optional double creationDate = 3;
    optional string account = 4;
    optional string protocol = 5;
    optional string server = 6;
    optional int32 port = 7;
    optional string authenticationType = 8;
    optional bytes data = 9;
    optional string path = 10;
    optional string comment = 11;
    optional string label = 12;
    optional string accessibility = 13;
    optional string viewHint = 14;
    optional string securityDomain = 15;
    optional bytes notes = 16;
    optional bytes history = 17;
    optional bytes clientDefined0 = 18;
    optional bytes clientDefined1 = 19;
    optional bytes clientDefined2 = 20;
    optional bytes clientDefined3 = 21;
    optional int64 creator = 22;
    optional int64 type = 23;
    optional string itemDescription = 24;
    // tag 25 appears unused/reserved in observed writeTo ordering
    optional int64 isInvisible = 26;
    optional int64 isNegative = 27;
    optional int64 customIcon = 28;
    optional int64 scriptCode = 29;
    optional bytes alias = 30;
}

message SharingItem {
    optional SharingPrivateKey privateKey = 2;
    optional SharingInternetPassword internetPassword = 3;
}
